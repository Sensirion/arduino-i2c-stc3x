name: Quality check

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  arduino-quality:
    uses: sensirion/.github/.github/workflows/driver.arduino.check.yml@main
    with:
      expect-arduino-examples: true
      dependency-list: '[{"name": "Sensirion Core"}, {"source-path": "./"}, {"name": "Sensirion I2C SHT4x"}]'
      lint-lib-manager-check: update
